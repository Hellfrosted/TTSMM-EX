version: 2

goal:
  title: "Architecture Ownership Maxima"
  slug: "architecture-ownership-maxima"
  kind: audit
  tranche: "Continue looping over duplicate-ownership and architecture deepening audits until a Judge or PM audit finds no more safe local issues."
  status: in_progress

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

