      - CONTEXT.md
      - docs/adr
      - src
      - src/__tests__
    constraints:
      - "Read-only."
      - "Use find-duplicate-ownership taxonomy buckets."
      - "Use improve-codebase-architecture terms: Module, Interface, Depth, Seam, Adapter, Leverage, Locality."
      - "Separate real duplicate ownership from legitimate boundary adapter and legitimate domain constraint code."
      - "Cite concrete files and symbols."
    expected_output:
      - "Taxonomy by code slice."
      - "Candidate duplicate-ownership findings with winning owner."
      - "Architecture deepening candidates with locality and leverage."
      - "Recommended Judge inputs for first safe tranche."
    receipt:
      result: done
      note: notes/T001-scout-map.md
