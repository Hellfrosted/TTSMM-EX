name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Check dead code
        run: pnpm run deadcode

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

  build-and-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install app runtime dependencies
        run: pnpm --dir release/app install --ignore-workspace --frozen-lockfile --ignore-scripts

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            native/block-lookup-extractor/target
          key: ${{ runner.os }}-cargo-block-lookup-${{ hashFiles('native/block-lookup-extractor/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-block-lookup-

      - name: Build native Block Lookup extractor
        run: pnpm run build:native:block-lookup

      - name: Build app
        run: pnpm run build

      - name: Smoke UI
        if: runner.os == 'Windows'
        run: pnpm run smoke:ui:built

      - name: Smoke UI
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm run smoke:ui:built
