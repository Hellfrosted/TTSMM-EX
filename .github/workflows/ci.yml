name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate app
        run: npm run validate

      - name: Smoke UI
        if: runner.os == 'Windows'
        run: npm run smoke:ui

      - name: Smoke UI
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run smoke:ui
