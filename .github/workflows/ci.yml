name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native Block Lookup extractor
        run: pnpm run build:native:block-lookup

      - name: Validate app
        run: pnpm run validate

      - name: Smoke UI
        if: runner.os == 'Windows'
        run: pnpm run smoke:ui:built

      - name: Smoke UI
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm run smoke:ui:built
