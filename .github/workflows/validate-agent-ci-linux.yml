name: Validate Linux CI (AgentCI)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Electron binary
        run: pnpm run ensure:electron

      - name: Lint
        run: pnpm run lint

      - name: Check Fallow
        run: pnpm run check:fallow

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

  build-and-smoke-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Electron binary
        run: pnpm run ensure:electron

      - name: Install app runtime dependencies
        run: pnpm --dir release/app install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential xvfb libnspr4 libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libgbm1 libasound2t64 ||
            sudo apt-get install -y build-essential xvfb libnspr4 libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libgbm1 libasound2

      - name: Cache Cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            native/block-lookup-extractor/target
          key: ${{ runner.os }}-cargo-block-lookup-${{ hashFiles('native/block-lookup-extractor/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-block-lookup-

      - name: Build native Block Lookup extractor
        run: pnpm run build:block-lookup

      - name: Build app
        run: pnpm run build

      - name: Smoke UI
        run: xvfb-run --auto-servernum pnpm run smoke:ui:built
